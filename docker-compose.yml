services:
  caibao-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: caibao-api
    ports:
      - "8000:8000"
    environment:
      APP_ENV: prod
      DB_LEGACY_INIT_ENABLED: "false"
      PYTHONPATH: /app
      DATABASE_URL: sqlite:////data/CaiBao.db
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4.1-mini}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-512}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
    volumes:
      - caibao_data:/data
    restart: unless-stopped

volumes:
  caibao_data:
