<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CaiBao Chat</title>
  <link rel="stylesheet" href="/web/styles.css?v=0.10.3" />
</head>
<body>
  <div class="bg-orb orb-a" aria-hidden="true"></div>
  <div class="bg-orb orb-b" aria-hidden="true"></div>
  <div class="noise" aria-hidden="true"></div>

  <div class="shell">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="product-badge-row">
          <div class="product-badge">CaiBao</div>
          <a class="admin-link" href="/web/admin.html" target="_blank" rel="noopener">Admin</a>
        </div>
        <button id="newSessionBtn" class="primary-btn" type="button">+ 新会话</button>

        <p class="section-title">会话列表</p>
        <ul id="historyList" class="history-list"></ul>

        <details class="sidebar-section" open>
          <summary class="section-summary">本会话文件</summary>
          <ul id="documentList" class="document-list"></ul>
        </details>
      </div>

      <button id="profileBtn" class="profile-card" type="button">
        <div class="avatar" id="avatarText">未</div>
        <div class="profile-meta">
          <strong id="profileName">未登录</strong>
          <span id="profileTeam">点击登录或切换账户</span>
        </div>
      </button>
    </aside>

    <main class="main-pane">
      <header class="main-topbar">
        <div class="picker-group">
          <label for="modelSelect">模型</label>
          <select id="modelSelect" aria-label="选择模型"></select>
        </div>

        <div class="picker-group">
          <label for="embeddingSelect">向量模型</label>
          <select id="embeddingSelect" aria-label="选择向量模型"></select>
        </div>

        <button id="refreshAllBtn" class="ghost-btn" type="button">刷新数据</button>
      </header>

      <section class="conversation">
        <h1 id="heroTitle">有什么我能帮你的？</h1>
        <div id="scenarioCards" class="scenario-cards">
          <button class="scenario-card" type="button" data-scene="summary">
            <strong>总结资料</strong>
            <span>快速提炼重点、风险和行动项</span>
          </button>
          <button class="scenario-card" type="button" data-scene="plan">
            <strong>写方案</strong>
            <span>生成目标、里程碑、资源和验收标准</span>
          </button>
          <button class="scenario-card" type="button" data-scene="qa">
            <strong>知识问答</strong>
            <span>基于本会话文件进行问答</span>
          </button>
        </div>
        <div id="messageList" class="message-list"></div>
      </section>

      <section class="composer-zone">
        <div id="attachmentStrip" class="attachment-strip"></div>

        <div id="attachMenu" class="attach-menu hidden" role="menu" aria-label="添加附件">
          <button id="uploadFileBtn" class="attach-menu-item" type="button">上传文件</button>
          <button id="pasteTextBtn" class="attach-menu-item" type="button">粘贴文本</button>
        </div>

        <div id="importComposer" class="import-composer hidden">
          <div class="field import-title-field">
            <label for="sourceName">文件名</label>
            <input id="sourceName" type="text" placeholder="例如：需求说明.md" />
          </div>
          <div class="field">
            <label for="fileContent">内容</label>
            <textarea id="fileContent" rows="6" placeholder="粘贴文本内容，导入后会自动切块并建立索引"></textarea>
          </div>
          <div class="import-actions">
            <button id="cancelImportBtn" class="ghost-btn compact-btn" type="button">取消</button>
            <button id="importBtn" class="primary-btn compact-primary-btn" type="button">导入</button>
          </div>
        </div>

        <input id="fileInput" class="hidden-file-input" type="file" multiple accept=".txt,.md,.pdf,.png,.jpg,.jpeg,.webp,text/plain,text/markdown,application/pdf,image/png,image/jpeg,image/webp" />

        <div class="composer">
          <button id="toggleImportBtn" class="icon-btn" type="button" title="添加附件">+</button>
          <textarea id="messageInput" rows="1" placeholder="输入你的问题，Enter 发送，Shift+Enter 换行"></textarea>
          <button id="sendBtn" class="send-btn" type="button">发送</button>
        </div>
      </section>
    </main>
  </div>

  <div id="previewDrawer" class="drawer hidden" aria-hidden="true">
    <div id="previewBackdrop" class="drawer-backdrop"></div>
    <aside class="drawer-panel" role="dialog" aria-modal="true" aria-labelledby="previewTitle">
      <div class="drawer-head">
        <div>
          <div class="drawer-eyebrow">引用文件</div>
          <h2 id="previewTitle">文件预览</h2>
        </div>
        <button id="closePreviewBtn" class="drawer-close" type="button" aria-label="关闭预览">×</button>
      </div>
      <div class="drawer-body">
        <div id="previewMeta" class="preview-meta"></div>
        <div id="previewSnippet" class="preview-snippet hidden"></div>
        <div id="previewMedia" class="preview-media hidden"></div>
        <pre id="previewContent" class="preview-content"></pre>
      </div>
    </aside>
  </div>

  <div id="authModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="authTitle">
    <div class="modal-card">
      <h2 id="authTitle">登录 / 切换账户</h2>
      <p class="modal-tip">产品层使用 account；后端会自动兼容映射到 team/user。</p>

      <div class="field">
        <label for="accountIdInput">account_id</label>
        <input id="accountIdInput" type="text" placeholder="例如：zhibirdw" />
      </div>
      <div class="field">
        <label for="accountNameInput">account_name</label>
        <input id="accountNameInput" type="text" placeholder="例如：一只长角的鸟" />
      </div>

      <div class="modal-actions">
        <button id="cancelAuthBtn" class="ghost-btn compact-btn" type="button">取消</button>
        <button id="saveAuthBtn" class="primary-btn compact-primary-btn" type="button">保存并登录</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/web/app.js?v=0.10.3" defer></script>
</body>
</html>
